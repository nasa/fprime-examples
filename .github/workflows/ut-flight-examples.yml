name: FlightExamples UTs

on:
  push:
    branches: [ devel, release/** ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ devel, release/** ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/actions/spelling/**'
      - '.github/ISSUE_TEMPLATE/**'


jobs:
  build:
    name: ""
    runs-on: ubuntu-latest
    steps:

    # Third-party code - do not upgrade without reviewing
    - uses: Dovyski/setup-opencv-action@v1.1
      with:
        opencv-version: '4.0.0'
        opencv-extra-modules: false
        install-deps: false

    - name: "Checkout Examples repo"
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: "Overlay nasa/fprime@devel"
      uses: actions/checkout@v4
      with:
        repository: nasa/fprime
        submodules: true
        path: ./FlightExamples/lib/fprime

    - name: "Build & UTs"
      uses: fprime-community/project-builder@main
      with:
        run_unit_tests: true
        build_location: ./FlightExamples
        fprime_location: ./FlightExamples/lib/fprime
